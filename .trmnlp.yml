# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
# auto-reload when files change (`watch: false` to disable)
watch:
  - .trmnlp.yml
  - src

# values of custom fields (defined in src/settings.yml)
custom_fields:
  username: theCapypara
  show_times: "true"
  stats:
    - Categories
    - Editors
  display: pie_chart_with_labels
  include_other: "false"

# override variables
variables:
  trmnl:
    is_trmnlp: true
